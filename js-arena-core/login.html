<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - JSArena</title>
    <link rel="stylesheet" href="frontend/css/global.css">
    <style>
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
        }

        .auth-card {
            width: 100%;
            max-width: 400px;
            padding: 40px;
        }

        .auth-card h2 {
            margin-bottom: 24px;
            text-align: center;
            color: var(--accent-green);
        }

        .auth-footer {
            margin-top: 24px;
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }
    </style>
</head>

<body>
    <div id="toast-container"></div>

    <nav class="navbar" id="navbar">
        <div class="logo">
            <a href="index.html">JSArena</a>
        </div>
        <div class="nav-links">
            <a href="../index.html">Main Home</a>
            <a href="index.html">JS Arena</a>
        </div>
    </nav>

    <main class="auth-container">
        <div class="card auth-card">
            <h2>Welcome Back</h2>
            <form id="login-form">
                <div class="form-group">
                    <label>Mobile Number</label>
                    <input type="text" id="mobileNumber" required placeholder="Enter your mobile number">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="btn-primary" style="width: 100%; margin-top: 16px;">Log In</button>
            </form>
            <div class="auth-footer">
                <a href="https://wa.me/917379685052?text=please%20change%20password" target="_blank"
                    style="display: block; margin-bottom: 12px; color: var(--text-secondary); font-size: 0.85rem;">Forgot
                    Password?</a>
                Don't have an account? <a href="register.html" style="color: var(--accent-green);">Sign up</a>
            </div>
        </div>
    </main>

    <script src="frontend/js/global.js"></script>
    <script src="frontend/js/login.js"></script>
</body>

</html>
