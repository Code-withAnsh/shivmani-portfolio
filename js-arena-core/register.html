<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - JSArena</title>
    <link rel="stylesheet" href="frontend/css/global.css">
    <style>
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
            padding: 40px 0;
        }

        .auth-card {
            width: 100%;
            max-width: 400px;
            padding: 40px;
        }

        .auth-card h2 {
            margin-bottom: 24px;
            text-align: center;
            color: var(--accent-green);
        }

        .auth-footer {
            margin-top: 24px;
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .api-guide {
            background-color: rgba(0, 255, 136, 0.05);
            border: 1px solid rgba(0, 255, 136, 0.2);
            border-radius: 8px;
            padding: 15px;
            margin-top: 5px;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
        
        .api-guide a {
            color: var(--accent-green);
            font-weight: 500;
        }
        
        .api-guide ol {
            margin-top: 10px;
            padding-left: 20px;
            margin-bottom: 0;
        }
        
        .api-guide li {
            margin-bottom: 5px;
        }
    </style>
</head>

<body>
    <div id="toast-container"></div>

    <nav class="navbar" id="navbar">
        <div class="logo">
            <a href="index.html">JSArena</a>
        </div>
        <div class="nav-links">
            <a href="../index.html">Main Home</a>
            <a href="index.html">JS Arena</a>
        </div>
    </nav>

    <main class="auth-container">
        <div class="card auth-card">
            <h2>Create Account</h2>
            <form id="register-form">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" required minlength="3">
                </div>
                <div class="form-group">
                    <label>Mobile Number</label>
                    <input type="text" id="mobileNumber" required placeholder="Enter mobile number">
                </div>
                <div class="form-group">
                    <label>Email (Optional)</label>
                    <input type="email" id="email">
                </div>
                
                <div class="form-group">
                    <label>Groq API Key (For Free AI Features)</label>
                    <input type="text" id="groqApiKey" placeholder="gsk_...">
                    <div class="api-guide">
                        <span>Get your FREE AI Key here: <br><a href="https://console.groq.com/keys" target="_blank">🎟️ console.groq.com/keys</a></span>
                        <ol>
                            <li>Click link & Login with Google.</li>
                            <li>Click "Create API Key" (name it JSArena).</li>
                            <li>Copy the key (gsk_...) and paste it above!</li>
                        </ol>
                    </div>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required minlength="6">
                </div>
                <button type="submit" class="btn-primary" style="width: 100%; margin-top: 16px;">Sign Up</button>
            </form>
            <div class="auth-footer">
                Already have an account? <a href="login.html" style="color: var(--accent-green);">Log in</a>
            </div>
        </div>
    </main>

    <script src="frontend/js/global.js"></script>
    <script src="frontend/js/register.js"></script>
</body>

</html>
